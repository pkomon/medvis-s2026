<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antimicrobial Resistance dashboard</title>
  <link rel="stylesheet" href="./style.css">
  <script type="importmap">
    {
      "imports": {
        "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm"
      }
    }
  </script>
  <script type="module" src="js/main.js"></script>
</head>

<body>
  <header>
    <div>
      <h1>Antimicrobial Resistance Dashboard</h1>
    </div>
    <div>
      <select id="area-mode-select">
        <option selected>Country</option>
        <option>Region</option>
      </select>
    </div>
  </header>
  <main>
    <div class="filters">
      <div><label for="bacteria-select">Bacteria</label></div>
      <div><select id="bacteria-select"></select></div>
      <div><label for="year-select">Year</label></div>
      <div>
        <select id="year-select">
          <option value="2020">2020</option>
          <option value="2021">2021</option>
          <option value="2022">2022</option>
          <option value="2023" selected>2023</option>
        </select>
      </div>
      <div class="country-mode"><label for="country-select">Country</label></div>
      <div class="country-mode"><select id="country-select"></select></div>
      <div class="region-mode" hidden><label for="region-select">Region</label></div>
      <div class="region-mode" hidden><select id="region-select"></select></div>
    </div>

    <section id="detail-panel" class="detail-panel" aria-live="polite">
      <h2>Selected antibiotic</h2>
      <div id="detail-content" class="detail-content">
        Hover or click an antibiotic to inspect resistance details.
      </div>
    </section>

    <div id="charts">
      <div class="country-mode">
        <h2>Antibiotics ranked by reported resistance</h2>
        <div id="barchart"></div>
      </div>
      <div hidden>
        <h2>Boxplot</h2>
        <div class="region-mode" id="boxplot"></div>
      </div>
      <div>
        <h2>Resistance trend over time per antibiotic</h2>
        <div id="linechart-grid" class="small-multiples-grid"></div>
      </div>
    </div>
  </main>
</body>

</html>
