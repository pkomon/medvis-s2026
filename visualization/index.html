<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antimicrobial Resistance dashboard</title>
  <link rel="stylesheet" href="./style.css">
  <script type="importmap">
    {
      "imports": {
        "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm"
      }
    }
  </script>
  <script type="module" src="js/main.js"></script>
</head>

<body>
  <header>
    <h1>Antimicrobial Resistance Dashboard</h1>
  </header>
  <main>
    <div class="filters">
      <div>
        <label for="infection-select">Infection:</label>
        <select id="infection-select">
        </select>
      </div>
      <div>
        <label for="year-select">Year:</label>
        <select id="year-select">
          <option value="2020">2020</option>
          <option value="2021">2021</option>
          <option value="2022">2022</option>
          <option value="2023">2023</option>
        </select>
      </div>
      <div>
        <label for="country-select">Country:</label>
        <select id="country-select">
        </select>
      </div>

    </div>

    <section id="detail-panel" class="detail-panel" aria-live="polite">
      <h2>Selected antibiotic</h2>
      <div id="detail-content" class="detail-content">
        Hover or click an antibiotic to inspect resistance details.
      </div>
    </section>

    <div id="charts">
      <div>
        <h2>Antibiotics ranked by reported resistance</h2>
        <div id="barchart"></div>
      </div>
      <div>
        <h2>Resistance trend over time per antibiotic</h2>
        <div id="linechart-grid"></div>
      </div>
    </div>
  </main>
</body>

</html>
